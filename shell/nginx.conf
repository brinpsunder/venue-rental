server {
    listen 80;

    # Reverse-proxy the micro-frontend bundles so the browser pulls
    # remoteEntry.js from the shell origin (no CORS, no public MFE ports).
    location /mfe/venues/ {
        proxy_pass http://venues-mfe/;
        proxy_set_header Host $host;
    }

    location /mfe/reservations/ {
        proxy_pass http://reservations-mfe/;
        proxy_set_header Host $host;
    }

    # All backend calls go through the BFF.
    location /api/ {
        proxy_pass http://web-bff:4000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
