name: Venue Service Tests

on:
  push:
    paths:
      - 'venue-service/**'
  pull_request:
    paths:
      - 'venue-service/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: venue-service

      - name: Run tests
        run: npm test
        working-directory: venue-service
        env:
          NODE_ENV: test
