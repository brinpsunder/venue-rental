name: Publish shell

on:
  push:
    branches: [main]
    paths:
      - 'shell/**'
      - '.github/workflows/docker-shell.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./shell
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/venue-rental-shell:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/venue-rental-shell:${{ github.sha }}
