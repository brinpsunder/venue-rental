version: '3.8'

services:
  user-service:
    build: ./user-service
    ports:
      - "3001:3001"
      - "50051:50051"
    environment:
      - PORT=3001
      - GRPC_PORT=50051
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL}
      - DB_HOST=user-db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      user-db:
        condition: service_healthy

  user-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  venue-service:
    build: ./venue-service
    ports:
      - "3002:3002"
      - "50052:50052"
    environment:
      - PORT=3002
      - GRPC_PORT=50052
      - LOG_LEVEL=${LOG_LEVEL}
      - DB_HOST=venue-db
      - DB_PORT=5432
      - DB_NAME=${VENUE_DB_NAME}
      - DB_USER=${VENUE_DB_USER}
      - DB_PASSWORD=${VENUE_DB_PASSWORD}
      - USER_SERVICE_HOST=user-service
      - USER_GRPC_PORT=50051
    depends_on:
      venue-db:
        condition: service_healthy
      user-service:
        condition: service_started

  venue-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${VENUE_DB_NAME}
      POSTGRES_USER: ${VENUE_DB_USER}
      POSTGRES_PASSWORD: ${VENUE_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - venue-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VENUE_DB_USER} -d ${VENUE_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  reservation-service:
    build: ./reservation-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - LOG_LEVEL=${LOG_LEVEL}
      - DB_HOST=reservation-db
      - DB_PORT=5432
      - DB_NAME=${RESERVATION_DB_NAME}
      - DB_USER=${RESERVATION_DB_USER}
      - DB_PASSWORD=${RESERVATION_DB_PASSWORD}
      - USER_SERVICE_HOST=user-service
      - USER_GRPC_PORT=50051
      - VENUE_SERVICE_HOST=venue-service
      - VENUE_GRPC_PORT=50052
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      reservation-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      user-service:
        condition: service_started
      venue-service:
        condition: service_started

  reservation-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${RESERVATION_DB_NAME}
      POSTGRES_USER: ${RESERVATION_DB_USER}
      POSTGRES_PASSWORD: ${RESERVATION_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - reservation-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RESERVATION_DB_USER} -d ${RESERVATION_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web-ui:
    build: ./web-ui
    ports:
      - "80:80"
    depends_on:
      - user-service
      - venue-service
      - reservation-service

volumes:
  user-db-data:
  venue-db-data:
  reservation-db-data:
