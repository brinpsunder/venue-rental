version: '3.8'

services:
  user-service:
    build: ./user-service
    ports:
      - "3001:3001"
      - "50051:50051"
    environment:
      - PORT=3001
      - GRPC_PORT=50051
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL}
      - DB_HOST=user-db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      user-db:
        condition: service_healthy

  user-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web-ui:
    build: ./web-ui
    ports:
      - "80:80"
    depends_on:
      - user-service

volumes:
  user-db-data:
