server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;

        # Module Federation fetches remoteEntry.js and chunks — allow CORS in
        # case the shell is served from a different origin during development.
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
